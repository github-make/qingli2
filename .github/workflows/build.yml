name: Build WinDirStat

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, Win32, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild windirstat.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143 /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDirStat-${{ matrix.configuration }}-${{ matrix.platform }}
          path: build/*.exe
